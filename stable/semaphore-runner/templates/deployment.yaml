apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "semaphoreRunner.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "semaphoreRunner.labels" . | nindent 4 }}
{{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
{{- end }}

spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.updateStrategy }}

  strategy:
    {{ toYaml .Values.updateStrategy | nindent 4 }}
  {{- end }}

  selector:
    matchLabels:
      {{- include "semaphoreRunner.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "semaphoreRunner.labels" . | nindent 8 }}
      annotations:
        {{- if not .Values.runner.existingSecret }}
        checksum/secret-token: {{ (include (print $.Template.BasePath "/secret-token.yaml") . | fromYaml).data | toYaml | sha256sum }}
        {{- end }}
        {{- if not .Values.runner.existingKeySecret }}
        checksum/secret-key: {{ (include (print $.Template.BasePath "/secret-key.yaml") . | fromYaml).data | toYaml | sha256sum }}
        {{- end }}
{{- if  .Values.annotations }}
        {{- toYaml .Values.annotations | nindent 8 }}
{{- end }}

    spec:
      {{- if .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml .Values.dnsConfig | nindent 8 }}

      {{- end }}
      serviceAccountName: {{ include "semaphoreRunner.serviceAccountName" . }}
      {{- if .Values.image.pullSecrets }}

      imagePullSecrets:
      {{- range .Values.image.pullSecrets }}
        - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- with .Values.securityContext }}

      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.extraInitContainers }}

      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: runner
          image: {{ .Values.image.repository }}:{{ .Values.image.tag | default (printf "v%s" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.podSecurityContext }}

          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          env:
            - name: SEMAPHORE_PORT
              value: ":3000"
            {{- if not (empty .Values.runner.webRoot) }}
            - name: SEMAPHORE_WEB_ROOT
              value: {{ .Values.runner.webRoot | quote }}
            {{- end }}
            - name: SEMAPHORE_TMP_PATH
              value: {{ .Values.runner.tmpPath | quote }}
            - name: SEMAPHORE_RUNNER_PRIVATE_KEY_FILE
              value: {{ .Values.runner.privateKeyFile | quote }}
            {{- $tokenSecret := .Values.runner.existingSecret | default (printf "%s-token" (include "semaphoreRunner.fullname" .)) }}
            - name: SEMAPHORE_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $tokenSecret }}
                  key: {{ .Values.runner.registrationTokenKey }}
                  optional: true
            - name: SEMAPHORE_RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $tokenSecret }}
                  key: {{ .Values.runner.apiTokenKey }}
                  optional: true
          {{- if or .Values.extraEnvSecrets .Values.extraEnvVariables }}
            {{- range $key, $value := .Values.extraEnvSecrets }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ required "Must specify secret!" $value.secret }}
                  key: {{ required "Must specify key!" $value.key }}
            {{- end }}
            {{- range $key, $value := .Values.extraEnvVariables }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
          {{- end }}
          {{- if or .Values.envFromSecrets .Values.envFromConfigMaps }}

          envFrom:
          {{- range $name := .Values.envFromSecrets }}
            - secretRef:
                name: {{ $name }}
          {{- end }}
          {{- range $name := .Values.envFromConfigMaps }}
            - configMapRef:
                name: {{ $name }}
          {{- end }}
          {{- end }}

          ports:
            - name: http
              containerPort: {{ .Values.runner.port }}
              protocol: TCP

          livenessProbe:
            exec:
              command: ["pgrep", "-f", "semaphore"]
            initialDelaySeconds: 30
            periodSeconds: 30

          readinessProbe:
            exec:
              command: ["pgrep", "-f", "semaphore"]
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- if .Values.resources }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: data
              mountPath: /var/lib/semaphore
            - name: tmp
              mountPath: /tmp/semaphore
            - name: runner-key
              mountPath: {{ .Values.runner.privateKeyFile }}
              subPath: {{ .Values.runner.privateKeyKey }}
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.extraSidecarContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}

      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}

      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}

      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "semaphoreRunner.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        - name: runner-key
          secret:
            secretName: {{ .Values.runner.existingKeySecret | default (printf "%s-key" (include "semaphoreRunner.fullname" .)) }}
            defaultMode: 0400
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
